name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]" 2>$null; if (-not $?) { pip install -e .; pip install pytest }
        shell: pwsh
      - name: Pytest
        run: |
          $env:PYTHONPATH = "packages"
          python -m pytest tests/test_agent_backend.py tests/test_config.py -q --tb=line
        shell: pwsh
        continue-on-error: true
